spring:
  application:
    name: scheduler

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3307}/DOVE_LAB?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:dove_app}
    password: ${DB_PASSWORD:dove1234}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      auto-commit: true

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false

krx:
  target-markets: ${KRX_TARGET_MARKETS:KOSPI,KOSDAQ}
  api:
    auth-key: ${KRX_API_AUTH_KEY:}

market:
  data:
    initial-date: ${MARKET_INITIAL_DATE:2010-01-01}
    cron: "0 5 8 * * MON-FRI"

completion:
  scan:
    cron: "0 0 12 * * *"

scheduler:
  thread-pool:
    core-size: ${SCHEDULER_CORE_POOL_SIZE:4}       # 상시 유지 스레드 수
    max-size: ${SCHEDULER_MAX_POOL_SIZE:8}          # 큐 포화 시 최대 스레드 수
    queue-capacity: ${SCHEDULER_QUEUE_CAPACITY:200} # 대기 큐 크기
  market-parallelism: ${SCHEDULER_MARKET_PARALLELISM:2} # 시장별 병렬 처리 스레드 수

logging:
  level:
    root: INFO
    com.dove: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    com.zaxxer.hikari: INFO
    org.springframework.scheduling: INFO
